<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>買房需求問卷表 - 永慶不動產</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: #f5f0eb;
    color: #333;
    line-height: 1.7;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
  .header {
    background: linear-gradient(135deg, #2c3e50, #34495e);
    color: #fff; text-align: center; padding: 36px 20px;
    border-radius: 12px 12px 0 0;
  }
  .header h1 { font-size: 28px; margin-bottom: 6px; }
  .header p { font-size: 14px; opacity: 0.85; }
  form {
    background: #fff; padding: 32px 28px;
    border-radius: 0 0 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .section { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #eee; }
  .section:last-child { border-bottom: none; margin-bottom: 0; }
  .section-title {
    font-size: 18px; font-weight: 700; color: #2c3e50;
    margin-bottom: 14px; padding-left: 10px; border-left: 4px solid #e67e22;
  }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #555; }
  .field .hint { font-size: 12px; color: #999; font-weight: 400; margin-left: 4px; }
  input[type="text"], input[type="tel"], input[type="email"], input[type="number"], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd;
    border-radius: 6px; font-size: 14px; font-family: inherit; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: #e67e22; box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
  }
  textarea { resize: vertical; min-height: 80px; }
  .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .radio-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 1px solid #ddd; border-radius: 20px;
    cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .radio-item:hover { border-color: #e67e22; background: #fef9f3; }
  .radio-item input[type="radio"] { accent-color: #e67e22; width: 16px; height: 16px; }
  .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .checkbox-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border: 1px solid #ddd; border-radius: 20px;
    cursor: pointer; font-size: 14px; transition: all 0.2s;
  }
  .checkbox-item:hover { border-color: #3498db; background: #f0f7ff; }
  .checkbox-item input[type="checkbox"] { accent-color: #3498db; width: 16px; height: 16px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
  button[type="submit"] {
    display: block; width: 100%; margin-top: 24px;
    padding: 14px; background: #e67e22; color: #fff;
    border: none; border-radius: 8px; font-size: 17px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  button[type="submit"]:hover { background: #d35400; }
  .footer-note { text-align: center; margin-top: 16px; font-size: 12px; color: #aaa; }
</style>
</head>

          <label class="checkbox-item"><input type="checkbox" name="orientation" value="坐南朝北"> 坐南朝北</label>

          <label class="checkbox-item"><input type="checkbox" name="orientation" value="不拘"> 不拘</label>

  }
  
  let summary='';
  const secs=[
    {t:'📋 基本資料',f:['name','phone','contact','age','family']},
    {t:'💰 購屋預算',f:['budget_range','down_payment','loan_help']},
    {t:'📐 坪數格局',f:['size','layout','parking']},
    {t:'🏗️ 房型偏好',f:['property_type','building_age','floor_pref','orientation']},
    {t:'📍 區域偏好',f:['district','location_feature']},
    {t:'🛒 生活機能',f:['amenity']},
    {t:'⭐ 特殊需求',f:['facility','renovation','fengshui','special_needs']},
    {t:'🎯 購屋動機',f:['motivation','timeline']},
    {t:'💬 備註',f:['notes']}
  ];
  secs.forEach(s=>{
    let t='';s.f.forEach(f=>{if(data[f])t+='  '+(Array.isArray(data[f])?data[f].join('、'):data[f])+'\n';});
    if(t)summary+='\n'+s.t+'\n'+t;
  });
  
  const name=data.name||'客戶',phone=data.phone||'未提供',now=new Date().toLocaleString('zh-TW',{timeZone:'Asia/Taipei'});
  const tgMsg=`🏠 永慶買房需求！\n\n👤 ${name}\n📞 ${phone}\n📅 ${now}\n${summary.trim()}`;
  const lineText=`🏠【永慶買房需求】\n👤 ${name}\n📞 ${phone}\n📅 ${now}\n\n== 需求摘要 ==${summary}\n\n---\n本資料已同步備份。`;
  const emailBody=`【永慶買房需求問卷】${name} - ${now}\n\n聯絡電話：${phone}\n${summary.trim()}\n\n---\n此問卷由永慶不動產自動發送`;

  let results=[];

  // 1. Telegram
  try{
    const r=await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TELEGRAM_CHAT_ID,text:tgMsg,parse_mode:'HTML'})});
    const j=await r.json();
    results.push(j.ok?'✅ Telegram 通知發送成功':'⚠️ Telegram 失敗：'+(j.description||''));
  }catch(e){results.push('⚠️ Telegram 連線失敗');}

  // 2. Gmail 自動備份（打 Flask 後端 API）
  try{
    const r=await fetch('https://boozy-spry-rockstar.ngrok-free.dev/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,body:emailBody})});
    const j=await r.json();
    results.push(j.ok?'📧 Gmail 備份已寄出':'⚠️ Gmail 失敗：'+(j.error||''));
  }catch(e){results.push('⚠️ Gmail 連線失敗');}

  // 3. 剪貼簿
  try{await navigator.clipboard.writeText(lineText);results.push('📋 需求已複製到剪貼簿');}catch(e){results.push('⚠️ 複製失敗');}

  submitBtn.disabled=false;submitBtn.textContent='✅ 送出問卷';

  alert(`🎉 感謝 ${name} 的填寫！\n\n📊 傳送狀態：\n${results.join('\n')}\n\n點確定後將開啟 LINE，您可直接轉傳問卷內容！`);
  window.open(`https://line.me/R/share?text=${encodeURIComponent(lineText)}`,'_blank');
});
</script>

</body>
